<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研修ドリル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "游ゴシック", "Yu Gothic", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: #4a7c59;
      color: white;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 1.3rem; margin-bottom: 10px; font-weight: bold; }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar {
      background: #a8e6c3;
      height: 100%;
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    .progress-label { font-size: 0.85rem; margin-top: 6px; opacity: 0.9; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ニックネームカード */
    .nickname-card {
      background: white;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #4a7c59;
    }

    .nickname-card h2 {
      font-size: 1rem;
      color: #4a7c59;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .nickname-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nickname-input {
      border: 2px solid #a0aec0;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.97rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      flex: 1;
      max-width: 300px;
    }

    .nickname-input:focus { border-color: #4a7c59; }

    .nickname-note {
      font-size: 0.83rem;
      color: #888;
      margin-top: 8px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #4a7c59;
      transition: opacity 0.3s, border-color 0.3s;
    }

    .card.done {
      border-left-color: #b0c4b8;
      opacity: 0.72;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-number { font-size: 1rem; font-weight: bold; color: #4a7c59; }
    .card.done .card-number { color: #888; }

    .done-badge { display: none; font-size: 1.2rem; }
    .card.done .done-badge { display: inline; }

    /* 通常テキスト行 */
    .field-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 4px 10px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      line-height: 1.7;
      align-items: start;
    }

    .field-label { font-weight: bold; color: #555; white-space: nowrap; }
    .field-value { color: #2d3748; }

    /* 入力行 */
    .input-row {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 4px 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .answer-input {
      border: 2px solid #a0aec0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .answer-input:focus { border-color: #4a7c59; }

    .answer-input:disabled {
      background: #f7fafc;
      color: #718096;
      cursor: not-allowed;
    }

    .submit-btn {
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #3a6248; }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* 解答例ブロック */
    .answer-section {
      display: none;
      background: #f0faf4;
      border: 1px solid #c6e6d2;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 12px 0 10px;
      animation: fadeIn 0.4s ease;
    }

    .answer-section.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .answer-label {
      font-weight: bold;
      color: #4a7c59;
      font-size: 0.88rem;
      margin-bottom: 5px;
    }

    .answer-text { font-size: 0.97rem; color: #2d3748; line-height: 1.6; }

    /* チェックボックス行 */
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a7c59;
      flex-shrink: 0;
    }

    .check-row input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.5; }

    .check-label { font-size: 0.95rem; color: #888; user-select: none; }
    .check-row.enabled .check-label { color: #2d3748; cursor: pointer; }

    /* 最終送信エリア */
    .final-submit-card {
      background: white;
      border-radius: 12px;
      padding: 24px 22px;
      margin-top: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #2b6cb0;
      text-align: center;
    }

    .final-submit-card h2 {
      font-size: 1rem;
      color: #2b6cb0;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .final-submit-card p {
      font-size: 0.88rem;
      color: #666;
      margin-bottom: 16px;
    }

    .final-btn {
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 40px;
      font-size: 1.05rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .final-btn:hover { background: #1a4f8a; }
    .final-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .send-result {
      margin-top: 14px;
      font-size: 0.93rem;
      font-weight: bold;
      display: none;
    }

    .send-result.success { color: #2f855a; display: block; }
    .send-result.error   { color: #c53030; display: block; }

    /* ========== スマホ対応 ========== */
    @media (max-width: 640px) {

      /* ヘッダー */
      header { padding: 14px 16px; }
      header h1 { font-size: 1.1rem; margin-bottom: 8px; }

      /* コンテナ余白 */
      .container { padding: 16px 12px 60px; }

      /* ニックネームカード */
      .nickname-card { padding: 16px 14px; }
      .nickname-row { flex-direction: column; align-items: stretch; }
      .nickname-input {
        max-width: 100%;
        font-size: 1rem;
        min-height: 44px;
        padding: 10px 14px;
      }

      /* 問題カード */
      .card { padding: 16px 14px; }

      /* 通常テキスト行：ラベルを上、内容を下に縦並び */
      .field-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 12px;
      }
      .field-label { font-size: 0.82rem; color: #4a7c59; }
      .field-value { font-size: 0.95rem; line-height: 1.7; padding-left: 4px; }

      /* 入力行：ラベル→入力欄→ボタン の縦並び */
      .input-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      .answer-input {
        width: 100%;
        font-size: 1rem;
        min-height: 44px;
        padding: 10px 12px;
      }
      .submit-btn {
        width: 100%;
        min-height: 44px;
        font-size: 1rem;
        padding: 10px 16px;
        border-radius: 8px;
      }

      /* 解答例ブロック */
      .answer-section { padding: 12px 12px; font-size: 0.93rem; }

      /* チェックボックス行：タップしやすく */
      .check-row { margin-top: 8px; gap: 10px; }
      .check-row input[type="checkbox"] {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
      }
      .check-label { font-size: 1rem; }

      /* 最終送信カード */
      .final-submit-card { padding: 20px 14px; }
      .final-btn {
        width: 100%;
        padding: 14px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>研修ドリル</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">完了: 0 / 0 問</div>
</header>

<div class="container">

  <!-- ニックネーム入力 -->
  <div class="nickname-card">
    <h2>ニックネームを入力してください</h2>
    <div class="nickname-row">
      <input
        type="text"
        id="nickname-input"
        class="nickname-input"
        placeholder="例：田中"
        maxlength="30"
      >
    </div>
    <p class="nickname-note">※ 回答を送信する際にニックネームが記録されます。</p>
  </div>

  <!-- 問題リスト -->
  <div id="problemList"></div>

  <!-- 最終送信ボタン -->
  <div class="final-submit-card">
    <h2>回答を送信する</h2>
    <p>全問の回答内容とニックネームをスプレッドシートに記録します。</p>
    <button class="final-btn" id="finalSubmitBtn" onclick="handleFinalSubmit()">送信</button>
    <div class="send-result" id="sendResult"></div>
  </div>

</div>

<script>
  // =============================================
  // Google Apps Script の Web App URL をここに入力
  // （デプロイ後に発行される URL を貼り付ける）
  // =============================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyMA0XiVphFAcJuwiwj3P45hVdz7h2fwB7pDlbwc6lLweOYY8mixvvyUfOoJhVgMcg7/exec";
  // =============================================

  const problems = [
    {
      id: 1,
      blank: "implication",
      premise:    "雨が降ると、地面はぬれる。",
      fact:       "今朝は強い雨が降った。",
      implication: null,
      answer:     "地面はぬれている。"
    },
    {
      id: 2,
      blank: "implication",
      premise:    "宿題をやらないと、先生に注意される。",
      fact:       "Bさんは昨日、宿題をやらなかった。",
      implication: null,
      answer:     "Bさんは先生に注意された。"
    },
    {
      id: 3,
      blank: "implication",
      premise:    "寝る時間が遅いと、次の日の朝は眠くなる。",
      fact:       "昨夜、Aさんは午前2時に寝た。",
      implication: null,
      answer:     "Aさんは今朝、眠い。"
    },
    {
      id: 4,
      blank: "implication",
      premise:    "電車が止まると、乗客の移動が遅れる。",
      fact:       "今朝、電車が1時間止まっていた。",
      implication: null,
      answer:     "乗客の移動は遅れた。"
    },
    {
      id: 5,
      blank: "implication",
      premise:    "約束の時間に遅れると、相手を待たせる。",
      fact:       "Cさんは待ち合わせに15分遅れた。",
      implication: null,
      answer:     "Cさんは相手を待たせた。"
    },
    {
      id: 6,
      blank: "premise",
      premise:    null,
      fact:       "この料理は冷蔵庫に入れずに一日置かれていた。",
      implication: "この料理は傷んでいる。",
      answer:     "料理は常温で長時間置くと、傷む。"
    },
    {
      id: 7,
      blank: "fact",
      premise:    "早めに家を出ると、遅刻しない。",
      fact:       null,
      implication: "Eさんは今日、学校に遅刻しなかった。",
      answer:     "Eさんは今日いつもより早く家を出た。"
    },
    {
      id: 8,
      blank: "fact",
      premise:    "問題文を最後まで読まないと、問いをまちがえる。",
      fact:       null,
      implication: "Fさんは問いをまちがえた。",
      answer:     "Fさんは問題文を途中までしか読まなかった。"
    },
    {
      id: 9,
      blank: "premise",
      premise:    null,
      fact:       "今日は土曜日である。",
      implication: "今日はA店は開いていない。",
      answer:     "A店の営業日は平日である（A店の休業日は土日である、など）"
    },
    {
      id: 10,
      blank: "implication",
      premise:    "会議の目的が共有されていないと、議論が拡散する。",
      fact:       "今回の会議では、最初に何を決める場なのか説明がなかった。",
      implication: null,
      answer:     "この会議では、議論が拡散した。（まとまらなかった、何も決まらなかったなど）"
    },
    {
      id: 11,
      blank: "implication",
      premise:    "顧客の要望を聞かずに作った提案は、相手の期待からずれる。",
      fact:       "担当者は提案前に顧客へのヒアリングを行わなかった。",
      implication: null,
      answer:     "この提案は、顧客の期待からずれている。"
    },
    {
      id: 12,
      blank: "implication",
      premise:    "報告で結論を先に示さないと、聞き手は話の全体像をつかめない。",
      fact:       "今回の報告では、担当者はいきなり細かい経緯から話し始めた。",
      implication: null,
      answer:     "聞き手は最初、報告の全体像をつかめなかった。"
    },
    {
      id: 13,
      blank: "implication",
      premise:    "役割分担が曖昧だと、作業に抜け漏れが出る。",
      fact:       "今回のイベント準備では、誰が備品を手配するか決まっていなかった。",
      implication: null,
      answer:     "このイベント準備では、作業に抜け漏れが出た。（備品手配に抜け漏れが出た）"
    },
    {
      id: 14,
      blank: "premise",
      premise:    null,
      fact:       "この資料は、提出期限の30分前に完成した。",
      implication: "この資料には見直し不足のミスがあった。",
      answer:     "提出直前に完成した資料には、ミスが多い。（見直し不足のミスが残る、などでも）"
    },
    {
      id: 15,
      blank: "premise",
      premise:    null,
      fact:       "今回の会議には、最終判断をする立場の人が出席していなかった。",
      implication: "この会議では、その場で結論を出せなかった。",
      answer:     "最終判断をする人がいない会議では、（その場で）結論を出せない。"
    },
    {
      id: 16,
      blank: "fact",
      premise:    "タスクの期限が明確だと、担当者は作業計画を立てられる。",
      fact:       null,
      implication: "担当者は、この仕事の作業計画を立てられた。",
      answer:     "この仕事では、タスクの期限が明確に示されていた。"
    },
    {
      id: 17,
      blank: "fact",
      premise:    "相手のメリットが示されていない提案は、採用されない。",
      fact:       null,
      implication: "この提案は、採用されない。",
      answer:     "この提案では、相手にとってのメリットが示されていない。\n（導入すると相手にどんな良いことがあるかが示されていない、などでも）"
    },
  ];

  const STORAGE_KEY = "drill_state_v2";

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function updateProgress() {
    const state = loadState();
    const done = problems.filter(p => state[p.id]?.checked).length;
    const total = problems.length;
    const pct = total ? (done / total * 100) : 0;
    document.getElementById("progressBar").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = `完了: ${done} / ${total} 問`;
  }

  function handleSubmit(id) {
    const input    = document.getElementById(`input-${id}`);
    const answerEl = document.getElementById(`answer-${id}`);
    const btnEl    = document.getElementById(`submit-${id}`);
    const checkEl  = document.getElementById(`check-${id}`);
    const rowEl    = document.getElementById(`checkrow-${id}`);

    input.disabled = true;
    btnEl.disabled = true;
    answerEl.classList.add("visible");
    checkEl.disabled = false;
    rowEl.classList.add("enabled");

    const state = loadState();
    if (!state[id]) state[id] = {};
    state[id].submitted  = true;
    state[id].userAnswer = input.value;
    saveState(state);
  }

  function handleCheck(id, checked) {
    const state = loadState();
    if (!state[id]) state[id] = {};
    state[id].checked = checked;
    saveState(state);
    document.getElementById(`card-${id}`).classList.toggle("done", checked);
    updateProgress();
  }

  function h(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/\n/g, "<br>");
  }

  function buildRows(p, s) {
    const isSubmitted = !!s.submitted;
    const saved = s.userAnswer || "";
    const labels = { premise: "前提条件：", fact: "個別事象：", implication: "意味合い：" };
    const fields = ["premise", "fact", "implication"];
    const placeholders = {
      premise:    "前提条件を入力してください",
      fact:       "個別事象を入力してください",
      implication:"意味合いを入力してください"
    };

    return fields.map(field => {
      if (field === p.blank) {
        return `
          <div class="input-row">
            <span class="field-label">${labels[field]}</span>
            <input
              type="text"
              id="input-${p.id}"
              class="answer-input"
              placeholder="${placeholders[field]}"
              value="${h(saved)}"
              ${isSubmitted ? "disabled" : ""}
            >
            <button id="submit-${p.id}" class="submit-btn" ${isSubmitted ? "disabled" : ""}>解答例表示</button>
          </div>`;
      } else {
        return `
          <div class="field-row">
            <span class="field-label">${labels[field]}</span>
            <span class="field-value">${h(p[field])}</span>
          </div>`;
      }
    }).join("");
  }

  function renderProblems() {
    const state = loadState();
    const list  = document.getElementById("problemList");
    list.innerHTML = "";

    problems.forEach(p => {
      const s = state[p.id] || {};
      const isSubmitted = !!s.submitted;
      const isChecked   = !!s.checked;

      const card = document.createElement("div");
      card.className = "card" + (isChecked ? " done" : "");
      card.id = `card-${p.id}`;

      card.innerHTML = `
        <div class="card-header">
          <span class="card-number">問題 ${p.id}</span>
          <span class="done-badge">✅</span>
        </div>
        ${buildRows(p, s)}
        <div class="answer-section ${isSubmitted ? "visible" : ""}" id="answer-${p.id}">
          <div class="answer-label">解答例</div>
          <div class="answer-text">${h(p.answer)}</div>
        </div>
        <div class="check-row ${isSubmitted ? "enabled" : ""}" id="checkrow-${p.id}">
          <input type="checkbox" id="check-${p.id}" ${isChecked ? "checked" : ""} ${isSubmitted ? "" : "disabled"}>
          <label class="check-label" for="check-${p.id}">できた</label>
        </div>
      `;

      list.appendChild(card);

      document.getElementById(`submit-${p.id}`).addEventListener("click", () => handleSubmit(p.id));
      document.getElementById(`input-${p.id}`).addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.isComposing) handleSubmit(p.id);
      });
      document.getElementById(`check-${p.id}`).addEventListener("change", e => handleCheck(p.id, e.target.checked));
    });

    updateProgress();
  }

  async function handleFinalSubmit() {
    const nickname = document.getElementById("nickname-input").value.trim();
    if (!nickname) {
      alert("ニックネームを入力してください。");
      document.getElementById("nickname-input").focus();
      return;
    }

    if (GAS_URL.startsWith("★")) {
      alert("Google Apps Script の URL がまだ設定されていません。\ndrill.html 内の GAS_URL を更新してください。");
      return;
    }

    const state = loadState();
    const answers = problems.map(p => ({
      id:         p.id,
      userAnswer: state[p.id]?.userAnswer ?? "（未回答）",
      checked:    state[p.id]?.checked    ?? false
    }));

    const payload = {
      nickname,
      timestamp: new Date().toLocaleString("ja-JP"),
      answers
    };

    const btn = document.getElementById("finalSubmitBtn");
    const resultEl = document.getElementById("sendResult");
    btn.disabled = true;
    btn.textContent = "送信中...";
    resultEl.className = "send-result";
    resultEl.textContent = "";

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });

      resultEl.textContent = "送信しました！スプレッドシートへの記録が完了しました。";
      resultEl.className = "send-result success";
      btn.disabled = false;
      btn.textContent = "送信";

    } catch (e) {
      resultEl.textContent = "送信に失敗しました。URLやネットワーク接続を確認してください。";
      resultEl.className = "send-result error";
      btn.disabled = false;
      btn.textContent = "送信";
    }
  }

  // ページ読み込み時に前回の入力内容をクリア
  localStorage.removeItem(STORAGE_KEY);

  renderProblems();
</script>
</body>
</html>
